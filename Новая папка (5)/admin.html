<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel - NOTRAGEN GAMES</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    .admin-container {
      display: grid;
      grid-template-columns: 250px 1fr;
      min-height: 100vh;
    }
    
    .admin-sidebar {
      background: rgba(45,52,54,0.95);
      padding: 20px;
      border-right: 1px solid rgba(108,92,231,0.3);
    }
    
    .admin-sidebar h3 {
      color: var(--secondary);
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    .admin-menu {
      list-style: none;
    }
    
    .admin-menu li {
      margin-bottom: 10px;
    }
    
    .admin-menu button {
      width: 100%;
      padding: 12px 15px;
      background: none;
      border: none;
      color: var(--light);
      text-align: left;
      cursor: pointer;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s;
    }
    
    .admin-menu button:hover,
    .admin-menu button.active {
      background: var(--gradient);
      color: white;
    }
    
    .admin-content {
      padding: 30px;
      overflow-y: auto;
    }
    
    .admin-section {
      display: none;
      animation: fadeIn 0.3s ease;
    }
    
    .admin-section.active {
      display: block;
    }
    
    .admin-card {
      background: rgba(45,52,54,0.8);
      border-radius: 12px;
      padding: 25px;
      margin-bottom: 20px;
      border: 1px solid rgba(108,92,231,0.2);
    }
    
    .admin-card h3 {
      margin-bottom: 20px;
      color: var(--secondary);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .price-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }
    
    .price-item {
      background: rgba(0,0,0,0.3);
      padding: 15px;
      border-radius: 8px;
    }
    
    .price-item label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
    }
    
    .price-item input {
      width: 100%;
      padding: 8px;
      border: 1px solid rgba(108,92,231,0.3);
      border-radius: 5px;
      background: rgba(0,0,0,0.2);
      color: white;
    }
    
    .withdrawals-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }
    
    .withdrawals-table th,
    .withdrawals-table td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    .withdrawals-table th {
      color: var(--secondary);
      font-weight: 600;
    }
    
    .status-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 500;
    }
    
    .status-pending {
      background: rgba(253,203,110,0.2);
      color: #fdcb6e;
    }
    
    .status-approved {
      background: rgba(0,184,148,0.2);
      color: #00b894;
    }
    
    .action-btn {
      padding: 6px 12px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.9rem;
      margin-right: 5px;
    }
    
    .btn-approve {
      background: var(--success);
      color: white;
    }
    
    .btn-reject {
      background: var(--danger);
      color: white;
    }
    
    .ad-upload {
      border: 2px dashed rgba(108,92,231,0.5);
      border-radius: 10px;
      padding: 30px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .ad-upload:hover {
      border-color: var(--secondary);
      background: rgba(108,92,231,0.1);
    }
    
    .ad-upload i {
      font-size: 2rem;
      color: var(--secondary);
      margin-bottom: 10px;
    }
    
    .ad-preview {
      margin-top: 15px;
      max-width: 300px;
      border-radius: 8px;
      display: none;
    }
    
    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 26px;
    }
    
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 26px;
    }
    
    .slider:before {
      position: absolute;
      content: "";
      height: 20px;
      width: 20px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    
    input:checked + .slider {
      background-color: var(--success);
    }
    
    input:checked + .slider:before {
      transform: translateX(24px);
    }
  </style>
</head>
<body>
  <!-- Admin Login Check -->
  <script>
    const currentUser = JSON.parse(localStorage.getItem('notragen_user') || 'null');
    if (!currentUser || !currentUser.isAdmin) {
      window.location.href = 'login.html';
    }
  </script>

  <div class="admin-container">
    <!-- Sidebar -->
    <aside class="admin-sidebar">
      <div class="logo">
        <img src="assets/icons/logo.png" alt="NOTRAGEN" style="width:40px">
        <h3>Admin Panel</h3>
      </div>
      <ul class="admin-menu">
        <li><button class="active" onclick="showSection('prices')"><i class="fas fa-coins"></i> Narxlarni Sozlash</button></li>
        <li><button onclick="showSection('withdrawals')"><i class="fas fa-money-bill-wave"></i> Yechib Olish So'rovlari</button></li>
        <li><button onclick="showSection('ads')"><i class="fas fa-ad"></i> Reklama Boshqaruv</button></li>
        <li><button onclick="logoutAdmin()"><i class="fas fa-sign-out-alt"></i> Chiqish</button></li>
      </ul>
    </aside>

    <!-- Main Content -->
    <main class="admin-content">
      <!-- Prices Section -->
      <section id="prices" class="admin-section active">
        <div class="admin-card">
          <h3><i class="fas fa-coins"></i> Diamond Narxlarini Sozlash</h3>
          <p style="margin-bottom:20px;color:#b2bec3">Do'konda ko'rsatiladigan diamond paketlari narxlarini o'zgartiring</p>
          
          <div class="price-grid" id="pricePackages">
            <!-- JS orqali to'ldiriladi -->
          </div>
          
          <button class="btn btn-primary" onclick="savePrices()" style="margin-top:20px">
            <i class="fas fa-save"></i> Narxlarni Saqlash
          </button>
        </div>
      </section>

      <!-- Withdrawals Section -->
      <section id="withdrawals" class="admin-section">
        <div class="admin-card">
          <h3><i class="fas fa-money-bill-wave"></i> Diamond Yechib Olish So'rovlari</h3>
          
          <table class="withdrawals-table">
            <thead>
              <tr>
                <th>Foydalanuvchi</th>
                <th>MLBB ID</th>
                <th>Server ID</th>
                <th>Miqdor</th>
                <th>Sana</th>
                <th>Holat</th>
                <th>Amallar</th>
              </tr>
            </thead>
            <tbody id="withdrawalsList">
              <!-- JS orqali to'ldiriladi -->
            </tbody>
          </table>
        </div>
      </section>

      <!-- Ads Section -->
      <section id="ads" class="admin-section">
        <div class="admin-card">
          <h3><i class="fas fa-ad"></i> Reklama Boshqaruv</h3>
          
          <div class="ad-upload" onclick="document.getElementById('adInput').click()">
            <i class="fas fa-cloud-upload-alt"></i>
            <p>Reklama rasmini yuklash uchun bosing</p>
            <input type="file" id="adInput" accept="image/*" style="display:none" onchange="previewAd(event)">
          </div>
          
          <img src="" alt="Reklama ko'rinishi" class="ad-preview" id="adPreview">
          
          <div style="margin:20px 0">
            <label style="display:flex;align-items:center;gap:10px">
              <span>Reklamani faollashtirish:</span>
              <label class="toggle-switch">
                <input type="checkbox" id="adActive" checked>
                <span class="slider"></span>
              </label>
            </label>
          </div>
          
          <div class="input-group" style="margin-bottom:15px">
            <label>Reklama Havolasi (ixtiyoriy)</label>
            <input type="url" id="adLink" placeholder="https://..."/>
          </div>
          
          <button class="btn btn-primary" onclick="saveAd()">
            <i class="fas fa-save"></i> Reklamani Saqlash
          </button>
        </div>
      </section>
    </main>
  </div>

  <script src="js/admin.js"></script>
</body>
</html>
